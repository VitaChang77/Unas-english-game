<!DOCTYPE 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四年級下學期 英文單字大挑戰</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        
        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* 週次選擇器 */
        .category-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            border: 2px solid #90caf9;
        }
        select {
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
            font-family: 'Microsoft JhengHei', sans-serif;
            cursor: pointer;
            font-weight: bold;
            color: #1565C0;
        }

        .mode-switch { margin-bottom: 20px; }
        .mode-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .mode-btn:hover { transform: scale(1.05); }
        .mode-btn.active { background-color: #2E8B57; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        
        .restart-btn { background-color: #FF9800; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        .speak-btn {
            background-color: #2196F3;
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-size: 18px;
            padding: 10px 25px;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 單字卡樣式 */
        .card {
            background: #ffeb3b;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            font-size: 32px;
            margin: 20px 0;
            cursor: pointer;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            user-select: none;
            word-wrap: break-word;
            font-weight: bold;
        }
        .card:active { transform: scale(0.95); }

        /* --- 拼字模式 UI --- */
        .input-group { margin: 20px 0; }
        input[type="text"] {
            padding: 15px;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 70%;
            text-align: center;
            font-family: 'Comic Sans MS', sans-serif;
        }
        input[type="text"]:disabled { background-color: #f5f5f5; color: #888; }

        .hint-btn {
            background-color: #FFC107;
            color: #333;
            font-weight: bold;
            margin-top: 10px;
            border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;
            font-size: 16px;
        }
        .hint-btn:disabled { background-color: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }
        .hint-display { color: #E65100; font-weight: bold; font-size: 24px; min-height: 35px; margin-top: 10px; letter-spacing: 2px; }
        .submit-btn { background-color: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 80%; }

        /* 通用反饋 */
        .feedback { min-height: 30px; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .correct-text { color: green; }
        .wrong-text { color: red; }
        
        .quiz-status { display: flex; justify-content: space-between; font-size: 16px; color: #555; margin-bottom: 10px; font-weight: bold; }
        .hidden { display: none; }
        .result-screen { text-align: center; }
        .final-score { font-size: 48px; color: #E91E63; font-weight: bold; margin: 20px 0; }
        .nav-btn { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <h1>🌟 下學期單字挑戰 🌟</h1>
    
    <div class="container">
        <div class="category-selector">
            <label for="week-select" style="display:block; margin-bottom:8px; font-weight:bold; color:#333;">📅 選擇你要練習的週次：</label>
            <select id="week-select" onchange="changeWeek()">
                <option value="week2">第 2 週</option>
                <option value="week3">第 3 週</option>
                <option value="week4">第 4 週</option>
                <option value="week5">第 5 週</option>
                <option value="week6">第 6 週</option>
                <option value="week7">第 7 週</option>
                <option value="week8">第 8 週</option>
                <option value="week9">第 9 週</option>
                <option value="week10">第 10 週</option>
                <option value="week11">第 11 週</option>
                <option value="week12">第 12 週</option>
                <option value="week13">第 13 週</option>
                <option value="week14">第 14 週</option>
                <option value="week15">第 15 週</option>
                <option value="week16">第 16 週</option>
                <option value="week17">第 17 週</option>
            </select>
        </div>

        <div class="mode-switch">
            <button onclick="setMode('study')" id="btn-study" class="mode-btn active">📖 練習模式</button>
            <button onclick="setMode('quiz')" id="btn-quiz" class="mode-btn">🎮 拼字測驗</button>
        </div>

        <div id="study-area">
            <div style="color:#888; font-size:14px;">本週單字進度: <span id="current-word-num">1</span> / <span id="total-words"></span></div>
            <div class="card" onclick="flipCard()" id="flashcard">
                載入中...
            </div>
            <button onclick="speakCurrentWord()" class="speak-btn">🔊 聽發音</button>
            <br><br>
            <button onclick="prevCard()" class="nav-btn" style="background-color: #999;">⬅️ 上一個</button>
            <button onclick="nextCard()" class="nav-btn">下一個 ➡️</button>
        </div>

        <div id="quiz-area" class="hidden">
            <div id="quiz-playing">
                <div class="quiz-status">
                    <span>題目: <span id="q-progress">1</span> / <span id="q-total">10</span></span>
                    <span>得分: <span id="score">0</span></span>
                </div>
                
                <div class="card" style="background: #e0f7fa; cursor: default; margin-bottom: 10px;">
                    <span id="quiz-question">題目</span>
                </div>
                
                <div style="color: #666; font-size: 14px;">請輸入英文單字：</div>
                <div class="input-group">
                    <input type="text" id="answer-input" placeholder="輸入英文..." autocomplete="off">
                </div>
                
                <button onclick="useHint()" id="btn-hint" class="hint-btn">💡 給我第一個字母提示</button>
                <div id="hint-display" class="hint-display"></div>
                
                <br>
                <button onclick="checkAnswer()" class="submit-btn">送出答案 ✅</button>
                
                <div class="feedback" id="feedback"></div>
            </div>

            <div id="quiz-result" class="hidden result-screen">
                <h2>🎉 測驗完成！ 🎉</h2>
                <div>你的分數是</div>
                <div class="final-score" id="final-score">100</div>
                <p id="comment">太厲害了！</p>
                <button onclick="startNewQuizRound()" class="restart-btn">🔄 再考一次</button>
            </div>
        </div>
    </div>

    <script>
        // --- 資料庫區 ---
        const wordData = {
            week2: [
                {ch: "三十", en: "thirty"}, {ch: "四十", en: "forty"}, {ch: "五十", en: "fifty"}, 
                {ch: "我們", en: "we"}, {ch: "我們的", en: "our"}, {ch: "地球", en: "earth"}, 
                {ch: "城市", en: "city"}, {ch: "咖啡", en: "coffee"}
            ],
            week3: [
                {ch: "六十", en: "sixty"}, {ch: "七十", en: "seventy"}, {ch: "八十", en: "eighty"}, 
                {ch: "小的", en: "small"}, {ch: "動物", en: "animal"}, {ch: "數字", en: "number"}, {ch: "布丁", en: "pudding"}
            ],
            week4: [
                {ch: "九十", en: "ninety"}, {ch: "百", en: "hundred"}, {ch: "我們 (受格)", en: "us"}, 
                {ch: "蛇", en: "snake"}, {ch: "熊貓", en: "panda"}, {ch: "給", en: "give"}, 
                {ch: "手套", en: "glove"}, {ch: "連指手套", en: "mitten"}
            ],
            week5: [
                {ch: "如何", en: "how"}, {ch: "誰", en: "who"}, {ch: "風", en: "wind"}, 
                {ch: "拿取", en: "take"}, {ch: "浴缸", en: "tub"}, {ch: "汽水", en: "soda"}, 
                {ch: "老虎", en: "tiger"}, {ch: "學生", en: "student"}, {ch: "小河", en: "river"}
            ],
            week6: [
                {ch: "鈴", en: "bell"}, {ch: "千", en: "thousand"}, {ch: "空氣", en: "air"}, 
                {ch: "雞", en: "chicken"}, {ch: "薯條", en: "French fries"}, {ch: "橘子", en: "tangerine"}, {ch: "左邊", en: "left"}
            ],
            week7: [
                {ch: "外套", en: "coat"}, {ch: "太陽", en: "sun"}, {ch: "雲", en: "cloud"}, 
                {ch: "每一", en: "every"}, {ch: "漢堡", en: "hamburger"}, {ch: "顧客", en: "customer"}, {ch: "右邊/正確的", en: "right"}
            ],
            week8: [
                {ch: "雪人", en: "snowman"}, {ch: "下雪的", en: "snowy"}, {ch: "何時", en: "when"}, 
                {ch: "我的", en: "my"}, {ch: "停", en: "stop"}, {ch: "力量", en: "power"}, {ch: "餐巾", en: "napkin"}
            ],
            week9: [
                {ch: "涼爽", en: "cool"}, {ch: "寒冷", en: "cold"}, {ch: "玩具", en: "toy"}, 
                {ch: "鞋子", en: "shoes"}, {ch: "下午", en: "afternoon"}, {ch: "斑馬", en: "zebra"}, 
                {ch: "胡椒", en: "pepper"}, {ch: "小時", en: "hour"}
            ],
            week10: [
                {ch: "熱", en: "hot"}, {ch: "溫暖", en: "warm"}, {ch: "短襪", en: "socks"}, 
                {ch: "早上", en: "morning"}, {ch: "晚上", en: "night"}, {ch: "袋鼠", en: "kangaroo"}, {ch: "鬆餅", en: "waffle"}
            ],
            week11: [
                {ch: "關上", en: "close"}, {ch: "打開", en: "open"}, {ch: "圖畫", en: "picture"}, 
                {ch: "點鐘", en: "o'clock"}, {ch: "大蒜", en: "garlic"}, {ch: "洋蔥", en: "onion"}, {ch: "海報", en: "poster"}
            ],
            week12: [
                {ch: "請", en: "please"}, {ch: "到", en: "to"}, {ch: "大頭針", en: "pin"}, 
                {ch: "手", en: "hand"}, {ch: "飢餓", en: "hungry"}, {ch: "可樂", en: "coke"}, 
                {ch: "茄子", en: "eggplant"}, {ch: "草本植物", en: "herb"}
            ],
            week13: [
                {ch: "兔子", en: "rabbit"}, {ch: "公牛", en: "ox"}, {ch: "母牛", en: "cow"}, 
                {ch: "麥克筆", en: "marker"}, {ch: "口罩/面具", en: "mask"}, {ch: "玉米", en: "corn"}, {ch: "竹子", en: "bamboo"}
            ],
            week14: [
                {ch: "蜜蜂", en: "bee"}, {ch: "開始", en: "start"}, {ch: "如", en: "as"}, 
                {ch: "尾巴", en: "tail"}, {ch: "分鐘", en: "minute"}, {ch: "蓮花", en: "lotus"}, {ch: "小黃瓜", en: "cucumber"}
            ],
            week15: [
                {ch: "極小的", en: "tiny"}, {ch: "蝌蚪", en: "tadpole"}, {ch: "顯示", en: "show"}, 
                {ch: "想要", en: "want"}, {ch: "熱狗", en: "hot dog"}, {ch: "生薑", en: "ginger"}, {ch: "巧克力", en: "chocolate"}
            ],
            week16: [
                {ch: "手臂", en: "arm"}, {ch: "手指", en: "finger"}, {ch: "孵出", en: "hatch"}, 
                {ch: "開始", en: "begin"}, {ch: "身體", en: "body"}, {ch: "喝", en: "drink"}, 
                {ch: "甜甜圈", en: "donut"}, {ch: "龍蝦", en: "lobster"}
            ],
            week17: [
                {ch: "腿", en: "leg"}, {ch: "腳趾", en: "toe"}, {ch: "前面", en: "front"}, 
                {ch: "後面", en: "back"}, {ch: "寬", en: "wide"}, {ch: "肺", en: "lung"}, 
                {ch: "筆記本/筆電", en: "notebook"}, {ch: "優格", en: "yogurt"}
            ]
        };

        let currentVocabList = [];
        
        // 練習變數
        let studyIdx = 0;
        let isFlipped = false;

        // 考試變數
        let quizQueue = [];     
        let quizIndex = 0;      
        let quizScore = 0;
        let isQuizFinished = false;
        
        // 本題狀態變數
        let isHintUsedThisQuestion = false;
        let wrongCount = 0; // 記錄同一題錯了幾次

        // 初始化
        window.onload = function() { 
            changeWeek(); 
        };

        // --- 切換週次 ---
        function changeWeek() {
            const selector = document.getElementById('week-select');
            const selectedWeek = selector.value;
            
            currentVocabList = wordData[selectedWeek];

            studyIdx = 0;
            isFlipped = false;
            document.getElementById('total-words').innerText = currentVocabList.length;
            updateStudyCard();
            
            if (!document.getElementById('quiz-area').classList.contains('hidden')) {
                startNewQuizRound();
            }
        }

        // --- 模式切換 ---
        function setMode(mode) {
            document.getElementById('study-area').classList.toggle('hidden', mode !== 'study');
            document.getElementById('quiz-area').classList.toggle('hidden', mode !== 'quiz');
            document.getElementById('btn-study').classList.toggle('active', mode === 'study');
            document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
            
            if(mode === 'quiz') {
                if (quizQueue.length === 0 || isQuizFinished) {
                    startNewQuizRound();
                } else {
                    document.getElementById('answer-input').focus();
                }
            }
        }

        // --- 發音 ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }
        function speakCurrentWord() { speak(currentVocabList[studyIdx].en); }

        // --- 練習模式 ---
        function updateStudyCard() {
            const card = document.getElementById('flashcard');
            card.innerText = currentVocabList[studyIdx].ch;
            card.style.background = '#ffeb3b'; 
            isFlipped = false;
            document.getElementById('current-word-num').innerText = studyIdx + 1;
        }

        function flipCard() {
            const card = document.getElementById('flashcard');
            if (isFlipped) {
                card.innerText = currentVocabList[studyIdx].ch;
                card.style.background = '#ffeb3b';
            } else {
                card.innerText = currentVocabList[studyIdx].en;
                card.style.background = '#fff9c4'; 
            }
            isFlipped = !isFlipped;
        }
        function nextCard() { studyIdx = (studyIdx + 1) % currentVocabList.length; updateStudyCard(); }
        function prevCard() { studyIdx = (studyIdx - 1 + currentVocabList.length) % currentVocabList.length; updateStudyCard(); }

        // --- 考試模式核心 ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startNewQuizRound() {
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-playing').classList.remove('hidden');

            let shuffled = shuffleArray([...currentVocabList]); 
            quizQueue = shuffled; 

            quizIndex = 0;
            quizScore = 0;
            isQuizFinished = false;

            document.getElementById('q-total').innerText = quizQueue.length;
            updateQuizUI();
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const currentWord = quizQueue[quizIndex];
            document.getElementById('quiz-question').innerText = currentWord.ch;
            document.getElementById('feedback').innerText = '';
            
            const inputField = document.getElementById('answer-input');
            inputField.value = '';
            inputField.disabled = false; // 解除鎖定
            document.getElementById('hint-display').innerText = '';
            inputField.focus();
            
            // 每題重置狀態
            isHintUsedThisQuestion = false;
            wrongCount = 0; 
            updateHintButtonState();
            
            updateQuizUI();
        }

        // --- 提示邏輯 ---
        function useHint() {
            if (!isHintUsedThisQuestion) {
                isHintUsedThisQuestion = true; 
                const word = quizQueue[quizIndex].en;
                
                let hintText = word.charAt(0) + " _ _ _";
                document.getElementById('hint-display').innerText = hintText;
                
                updateHintButtonState(); 
                document.getElementById('answer-input').focus();
            }
        }

        function updateHintButtonState() {
            const btn = document.getElementById('btn-hint');
            if (isHintUsedThisQuestion) {
                btn.disabled = true;
                btn.innerText = "💡 提示已使用";
            } else {
                btn.disabled = false;
                btn.innerText = "💡 給我第一個字母提示";
            }
        }

        // --- 拼字檢查邏輯 (重點修改：答錯停留在原題) ---
        function checkAnswer() {
            if (isQuizFinished) return;
            const inputField = document.getElementById('answer-input');
            const userAns = inputField.value.trim();
            const feedback = document.getElementById('feedback');
            const currentWord = quizQueue[quizIndex];
            
            if (!userAns) return; 

            if (userAns.toLowerCase() === currentWord.en.toLowerCase()) {
                // 【答對了】
                feedback.innerText = "答對了！ ✅";
                feedback.className = "feedback correct-text";
                
                // 只有「第一次就答對」(沒錯過) 才能得 10 分
                if (wrongCount === 0) {
                    quizScore += 10;
                }
                updateQuizUI();
                
                speak(currentWord.en);
                inputField.disabled = true; // 鎖定輸入框，準備換題
                setTimeout(nextQuestion, 1200);
            } else {
                // 【答錯了】
                wrongCount++; // 錯誤次數 +1
                
                if (wrongCount >= 3) {
                    // 卡關防呆：錯 3 次以上直接給答案，但仍要自己打出來
                    feedback.innerText = `正確答案是: ${currentWord.en} (請照著拼一次)`;
                } else {
                    // 一般錯誤提示
                    feedback.innerText = "答錯了，請再試一次！💪";
                }
                
                feedback.className = "feedback wrong-text";
                inputField.value = ''; // 清空讓小朋友重打
                inputField.focus();    // 焦點回到輸入框，停留在這一題
            }
        }
        
        // 按 Enter 提交
        document.getElementById("answer-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        function updateQuizUI() {
            document.getElementById('q-progress').innerText = quizIndex + 1;
            document.getElementById('score').innerText = quizScore;
        }

        function nextQuestion() {
            quizIndex++;
            if (quizIndex < quizQueue.length) {
                showQuizQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            isQuizFinished = true;
            document.getElementById('quiz-playing').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            
            const maxScore = quizQueue.length * 10;
            document.getElementById('final-score').innerText = `${quizScore} / ${maxScore}`;
            
            const comment = document.getElementById('comment');
            if (quizScore === maxScore) comment.innerText = "太神啦！全對！🌟";
            else if (quizScore >= maxScore * 0.8) comment.innerText = "很棒喔！繼續保持！👍";
            else if (quizScore >= maxScore * 0.6) comment.innerText = "及格了，再接再厲！💪";
            else comment.innerText = "沒關係，多玩幾次就會了！🔥";
        }
    </script>
</body>
</html>
